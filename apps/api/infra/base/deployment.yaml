apiVersion: apps/v1
kind: Deployment
metadata:
  name: hightower-api
  namespace: hightower
  labels:
    app: hightower-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hightower-api
  template:
    metadata:
      labels:
        app: hightower-api
      annotations:
        kubectl.kubernetes.io/restartedAt: "2026-04-21T12:45:00Z"
    spec:
      serviceAccountName: hightower-api
      containers:
        - name: api
          image: ghcr.io/farhoodliquor/hightower-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: TEMPORAL_ADDRESS
              value: hightower-temporal:7233
            - name: WORKER_IMAGE
              value: ghcr.io/farhoodliquor/shannon:latest
            - name: K8S_NAMESPACE
              value: hightower
          envFrom:
            - secretRef:
                name: hightower-credentials
          volumeMounts:
            - name: workspaces
              mountPath: /app/workspaces
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
      volumes:
        - name: workspaces
          persistentVolumeClaim:
            claimName: hightower-workspaces
