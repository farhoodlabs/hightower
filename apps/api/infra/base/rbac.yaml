apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hightower-api
  namespace: hightower
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "delete", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hightower-api
  namespace: hightower
subjects:
  - kind: ServiceAccount
    name: hightower-api
    namespace: hightower
roleRef:
  kind: Role
  name: hightower-api
  apiGroup: rbac.authorization.k8s.io
