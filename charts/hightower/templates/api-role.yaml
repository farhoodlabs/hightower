apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "hightower.api.fullname" . }}
  labels:
    {{- include "hightower.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "delete", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
