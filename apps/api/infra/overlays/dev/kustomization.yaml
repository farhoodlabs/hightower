apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: hightower-api
      spec:
        template:
          spec:
            containers:
              - name: api
                imagePullPolicy: Never
