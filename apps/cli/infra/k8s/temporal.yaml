apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: temporal-data
  namespace: shannon
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shannon-temporal
  namespace: shannon
  labels:
    app: shannon-temporal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shannon-temporal
  template:
    metadata:
      labels:
        app: shannon-temporal
    spec:
      containers:
        - name: temporal
          image: temporalio/temporal:latest
          args:
            - server
            - start-dev
            - --db-filename
            - /home/temporal/temporal.db
            - --ip
            - "0.0.0.0"
          ports:
            - containerPort: 7233
              name: grpc
            - containerPort: 8233
              name: web-ui
          volumeMounts:
            - name: data
              mountPath: /home/temporal
          readinessProbe:
            exec:
              command:
                - temporal
                - operator
                - cluster
                - health
                - --address
                - localhost:7233
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: temporal-data
---
apiVersion: v1
kind: Service
metadata:
  name: shannon-temporal
  namespace: shannon
spec:
  selector:
    app: shannon-temporal
  ports:
    - name: grpc
      port: 7233
      targetPort: 7233
    - name: web-ui
      port: 8233
      targetPort: 8233
